<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atrapar Limones</title>
  <link rel="stylesheet" href="limones.css">
  <script src="utils.js"></script>
</head>
<body onload="iniciar()">

  <!-- Fondo de granja nocturna -->
  <svg class="fondo-svg" viewBox="0 0 900 600" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#0a1628"/>
        <stop offset="60%" stop-color="#0d2244"/>
        <stop offset="100%" stop-color="#1a3a2a"/>
      </linearGradient>
      <linearGradient id="grd" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#1a4a1a"/>
        <stop offset="100%" stop-color="#0d2a0d"/>
      </linearGradient>
      <radialGradient id="moon" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#fff9c4"/>
        <stop offset="100%" stop-color="#f9e44a"/>
      </radialGradient>
    </defs>

    <!-- Cielo -->
    <rect width="900" height="600" fill="url(#sky)"/>

    <!-- Luna -->
    <circle cx="780" cy="70" r="38" fill="url(#moon)" opacity="0.9"/>
    <circle cx="780" cy="70" r="44" fill="none" stroke="#fff9c4" stroke-width="1" opacity="0.25"/>

    <!-- Estrellas -->
    <circle cx="28"  cy="55"  r="2"   fill="#fff" opacity="0.9"/>
    <circle cx="95"  cy="30"  r="1.5" fill="#fff" opacity="0.8"/>
    <circle cx="180" cy="18"  r="2.5" fill="#fff" opacity="0.7"/>
    <circle cx="260" cy="45"  r="1.5" fill="#fff" opacity="0.9"/>
    <circle cx="340" cy="15"  r="2"   fill="#fff" opacity="0.6"/>
    <circle cx="430" cy="35"  r="1.5" fill="#fff" opacity="0.8"/>
    <circle cx="510" cy="12"  r="2"   fill="#fff" opacity="0.7"/>
    <circle cx="600" cy="40"  r="1.5" fill="#fff" opacity="0.9"/>
    <circle cx="660" cy="22"  r="2"   fill="#fff" opacity="0.65"/>
    <circle cx="720" cy="50"  r="1"   fill="#fff" opacity="0.8"/>
    <circle cx="840" cy="30"  r="1.5" fill="#fff" opacity="0.7"/>
    <circle cx="870" cy="15"  r="2"   fill="#fff" opacity="0.8"/>
    <circle cx="55"  cy="140" r="1.5" fill="#fff" opacity="0.5"/>
    <circle cx="145" cy="95"  r="1"   fill="#fff" opacity="0.6"/>
    <circle cx="222" cy="120" r="1.5" fill="#fff" opacity="0.4"/>
    <circle cx="315" cy="80"  r="1"   fill="#fff" opacity="0.7"/>
    <circle cx="490" cy="90"  r="1.5" fill="#fff" opacity="0.5"/>

    <!-- Suelo -->
    <rect x="0" y="390" width="900" height="210" fill="url(#grd)"/>
    <ellipse cx="450" cy="392" rx="900" ry="30" fill="#1a4a1a"/>
    <rect x="0" y="390" width="900" height="20" fill="#1e5c1e"/>

    <!-- Pasto -->
    <ellipse cx="65"  cy="395" rx="8" ry="5" fill="#2d7a2d" opacity="0.7"/>
    <ellipse cx="80"  cy="396" rx="7" ry="4" fill="#339933" opacity="0.7"/>
    <ellipse cx="50"  cy="396" rx="6" ry="4" fill="#2a6b2a" opacity="0.7"/>
    <ellipse cx="185" cy="394" rx="9" ry="5" fill="#2d7a2d" opacity="0.7"/>
    <ellipse cx="200" cy="395" rx="7" ry="4" fill="#3aaa3a" opacity="0.7"/>
    <ellipse cx="700" cy="395" rx="8" ry="5" fill="#2d7a2d" opacity="0.7"/>
    <ellipse cx="715" cy="396" rx="7" ry="4" fill="#339933" opacity="0.7"/>
    <ellipse cx="820" cy="394" rx="9" ry="5" fill="#2d7a2d" opacity="0.7"/>
    <ellipse cx="840" cy="395" rx="6" ry="4" fill="#3aaa3a" opacity="0.7"/>

    <!-- Árbol limonero izquierdo -->
    <rect x="52" y="290" width="12" height="110" rx="4" fill="#5a3a1a"/>
    <ellipse cx="58" cy="280" rx="42" ry="50" fill="#155a15"/>
    <ellipse cx="58" cy="260" rx="32" ry="38" fill="#1d7a1d"/>
    <ellipse cx="58" cy="248" rx="22" ry="26" fill="#22aa22"/>
    <circle cx="40" cy="275" r="5" fill="#FFD700" opacity="0.9"/>
    <circle cx="68" cy="265" r="5" fill="#FFD700" opacity="0.85"/>
    <circle cx="52" cy="290" r="4.5" fill="#FFA500" opacity="0.9"/>
    <circle cx="76" cy="282" r="4" fill="#FFD700" opacity="0.8"/>
    <circle cx="36" cy="258" r="4" fill="#FFA500" opacity="0.75"/>

    <!-- Árbol limonero derecho -->
    <rect x="815" y="295" width="12" height="105" rx="4" fill="#5a3a1a"/>
    <ellipse cx="821" cy="283" rx="44" ry="52" fill="#155a15"/>
    <ellipse cx="821" cy="262" rx="34" ry="40" fill="#1d7a1d"/>
    <ellipse cx="821" cy="250" rx="24" ry="28" fill="#22aa22"/>
    <circle cx="802" cy="278" r="5" fill="#FFD700" opacity="0.9"/>
    <circle cx="832" cy="268" r="5" fill="#FFA500" opacity="0.85"/>
    <circle cx="816" cy="295" r="4.5" fill="#FFD700" opacity="0.9"/>
    <circle cx="840" cy="285" r="4" fill="#FFA500" opacity="0.8"/>
    <circle cx="800" cy="261" r="4" fill="#FFD700" opacity="0.75"/>

    <!-- Árboles secundarios -->
    <g opacity="0.6">
      <rect x="142" y="315" width="9" height="90" rx="3" fill="#5a3a1a"/>
      <ellipse cx="147" cy="305" rx="30" ry="36" fill="#155a15"/>
      <ellipse cx="147" cy="290" rx="22" ry="26" fill="#1d7a1d"/>
      <ellipse cx="147" cy="280" rx="14" ry="18" fill="#22aa22"/>
      <circle cx="135" cy="300" r="4" fill="#FFD700" opacity="0.85"/>
      <circle cx="158" cy="294" r="3.5" fill="#FFA500" opacity="0.8"/>
    </g>
    <g opacity="0.6">
      <rect x="740" y="318" width="9" height="88" rx="3" fill="#5a3a1a"/>
      <ellipse cx="745" cy="308" rx="30" ry="36" fill="#155a15"/>
      <ellipse cx="745" cy="293" rx="22" ry="26" fill="#1d7a1d"/>
      <ellipse cx="745" cy="283" rx="14" ry="18" fill="#22aa22"/>
      <circle cx="732" cy="303" r="4" fill="#FFD700" opacity="0.85"/>
      <circle cx="756" cy="297" r="3.5" fill="#FFA500" opacity="0.8"/>
    </g>

    <!-- Granero -->
    <rect x="380" y="460" width="140" height="80" rx="4" fill="#8b3a3a"/>
    <polygon points="380,460 450,420 520,460" fill="#a04040"/>
    <rect x="415" y="500" width="30" height="40" rx="3" fill="#3a2010"/>
    <rect x="460" y="490" width="28" height="28" rx="3" fill="#4a90d0" opacity="0.6"/>
    <line x1="474" y1="490" x2="474" y2="518" stroke="#3a7ab0" stroke-width="1.5"/>
    <line x1="460" y1="504" x2="488" y2="504" stroke="#3a7ab0" stroke-width="1.5"/>

    <!-- Cerca izquierda -->
    <rect x="0"   y="450" width="4" height="50" rx="1" fill="#8b6914" opacity="0.7"/>
    <rect x="20"  y="455" width="4" height="45" rx="1" fill="#8b6914" opacity="0.7"/>
    <rect x="40"  y="452" width="4" height="48" rx="1" fill="#8b6914" opacity="0.7"/>
    <rect x="-2"  y="462" width="48" height="5" rx="2" fill="#a07820" opacity="0.6"/>
    <rect x="-2"  y="478" width="48" height="5" rx="2" fill="#a07820" opacity="0.6"/>

    <!-- Cerca derecha -->
    <rect x="856" y="450" width="4" height="50" rx="1" fill="#8b6914" opacity="0.7"/>
    <rect x="876" y="455" width="4" height="45" rx="1" fill="#8b6914" opacity="0.7"/>
    <rect x="896" y="452" width="4" height="48" rx="1" fill="#8b6914" opacity="0.7"/>
    <rect x="854" y="462" width="48" height="5" rx="2" fill="#a07820" opacity="0.6"/>
    <rect x="854" y="478" width="48" height="5" rx="2" fill="#a07820" opacity="0.6"/>

    <!-- Oscurecedor sutil -->
    <rect x="0" y="0" width="900" height="600" fill="rgba(5,10,25,0.35)"/>
  </svg>

  <div class="contenedor">
    <header class="encabezado">
      <span class="icono">🍋</span>
      <h1>Atrapar Limones</h1>
      <p>¡Atrapa todos los limones!</p>
    </header>

    <div class="panel">
      <div class="tarjeta puntaje">
        <div class="icono-stat">⭐</div>
        <div class="info">
          <label>Puntaje</label>
          <span id="txtPuntaje">0</span>
        </div>
      </div>
      <div class="tarjeta vidas">
        <div class="icono-stat">❤️</div>
        <div class="info">
          <label>Vidas</label>
          <span id="txtVida">3</span>
        </div>
      </div>
    </div>

    <div class="juego">
      <canvas id="areaJuego" width="1000" height="460"></canvas>
    </div>

    <div class="divisor"></div>

    <div class="botones">
      <button onclick="moverIzquierda()" title="Izquierda">⬅</button>
      <button onclick="moverDerecha()" title="Derecha">➡</button>
      <button onclick="bajarLimon()" title="Bajar limón">🍋</button>
      <button class="reiniciar" onclick="reiniciar()">🔄 Reiniciar</button>
    </div>
  </div>

  <script src="limones.js"></script>
</body>
</html>
